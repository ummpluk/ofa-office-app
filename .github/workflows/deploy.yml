name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Firebase Tools
        run: npm install -g firebase-tools

      - name: Copy Firebase files to root
        run: |
          cp -r "DOC/โฟลเดอร์ใหม่/OFAFirebaseHosting2/ofa-hosting/public" ./public
          cp "DOC/โฟลเดอร์ใหม่/OFAFirebaseHosting2/ofa-hosting/firebase.json" ./firebase.json
          cp "DOC/โฟลเดอร์ใหม่/OFAFirebaseHosting2/ofa-hosting/.firebaserc" ./.firebaserc

      - name: Deploy to Firebase Hosting
        run: firebase deploy --only hosting --project oneforall-office --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
