name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy Firebase files to root
        run: |
          cp -r "DOC/โฟลเดอร์ใหม่/OFAFirebaseHosting2/ofa-hosting/public" ./public
          cp "DOC/โฟลเดอร์ใหม่/OFAFirebaseHosting2/ofa-hosting/firebase.json" ./firebase.json
          cp "DOC/โฟลเดอร์ใหม่/OFAFirebaseHosting2/ofa-hosting/.firebaserc" ./.firebaserc

      - name: Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: oneforall-office
